$def with (productos)
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Lista de Productos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            color: #333;
        }
        .tabla-productos {
            width: 100%;
            border-collapse: collapse; 
            margin-top: 20px;
            font-size: 16px;
        }
        .tabla-productos th, .tabla-productos td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd; 
        }
        .tabla-productos th {
            background-color: #2c3e50; 
            color: white;
            font-weight: bold;
        }
        .tabla-productos tr:hover {
            background-color: #f5f5f5;
        }
        .btn-borrar {
            background-color: #e74c3c; 
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-borrar:hover {
            background-color: #c0392b;
        }
        .btn-añadir {
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
        }
        .btn-añadir:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>Lista de Productos</h1>

    <table class="tabla-productos">
        <thead>
            <tr>
                <th>ID</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Calidad</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            $for producto in productos:
                <tr>
                    <td>$producto['id_productos']</td>
                    <td>$$$producto['precio']</td>
                    <td>$producto['cantidad']</td>
                    <td>$producto['calidad']</td>
                    <td>$producto['descripcion']</td>
                    <td>
                        <a href="/borrar_productos/$producto['id_productos']">
                            <button class="btn-borrar">Borrar producto</button>
                        </a>
                    </td>
                </tr>
        </tbody>
    </table>

    <p>Añadir producto</p>
    <a href="/insertar_producto"><button class="btn-añadir">Añadir</button></a>

    <br><br>
    <a href="/" style="color: #34495e;">Volver al Inicio</a>

</body>
</html>
