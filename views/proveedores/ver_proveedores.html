$def with (proveedores)
<h1>LISTA DE PROVEEDORES</h1>
<table>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Tipo de producto</th>
        <th>Clase de producto</th>
        <th>Distribuidor</th>
        <th>Más</th>
    </tr>
    $for proveedor in proveedores
        <tr>
            <th>$proveedor['id_proveedor']</th>
            <th>$proveedor['nombre']</th>
            <th>$proveedor['tipo']</th>
            <th>$proveedor['clase']</th>
            <th>$proveedor['nombre_neg']</th>
            <th><a href="/borrar_proveedores/$proveedor['id_proveedor']"><button>borrar</button></a></th>
        </tr>
</table>
<p>Añadir proveedor</p>
<a href="/"><button>Regresar</button></a>
<a href="/insert_proveedor"><button>Añadir</button></a>
